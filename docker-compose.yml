services:
  thalovant-mcp:
    build: .
    image: ghcr.io/thalovant/thalovant-mcp-server:0.1.2
    ports:
      - "3000:3000"
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "3000"
      MCP_PUBLIC_URL: http://localhost:3000
      MCP_HTTP_AUTH_TOKEN: ${MCP_HTTP_AUTH_TOKEN:?set MCP_HTTP_AUTH_TOKEN}
      MCP_HTTP_ALLOWED_HOSTS: localhost:3000,127.0.0.1:3000
      MCP_AUDIT_LOG: stderr
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
