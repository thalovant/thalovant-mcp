apiVersion: v1
kind: Secret
metadata:
  name: thalovant-mcp-secrets
type: Opaque
stringData:
  MCP_HTTP_AUTH_TOKEN: replace-with-long-random-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thalovant-mcp-config
data:
  MCP_TRANSPORT: http
  MCP_HTTP_HOST: 0.0.0.0
  MCP_HTTP_PORT: "3000"
  MCP_PUBLIC_URL: https://mcp.example.com
  MCP_HTTP_ALLOWED_HOSTS: mcp.example.com
  MCP_HTTP_ALLOWED_ORIGINS: https://agent.example.com
  MCP_AUDIT_LOG: stderr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thalovant-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thalovant-mcp
  template:
    metadata:
      labels:
        app: thalovant-mcp
    spec:
      containers:
        - name: thalovant-mcp
          image: ghcr.io/thalovant/thalovant-mcp-server:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: thalovant-mcp-config
            - secretRef:
                name: thalovant-mcp-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: thalovant-mcp
spec:
  selector:
    app: thalovant-mcp
  ports:
    - name: http
      port: 80
      targetPort: 3000
