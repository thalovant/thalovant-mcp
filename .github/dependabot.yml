version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: {interval: weekly, day: monday, time: "09:00", timezone: America/Toronto}
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "*"
        update-types: [version-update:semver-minor, version-update:semver-patch]
    groups:
      npm-routine-updates: {applies-to: version-updates, patterns: ["*"], update-types: [minor, patch]}
      npm-security-updates: {applies-to: security-updates, patterns: ["*"]}

  - package-ecosystem: docker
    directory: /
    schedule: {interval: weekly, day: monday, time: "09:10", timezone: America/Toronto}
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "*"
        update-types: [version-update:semver-minor, version-update:semver-patch]
    groups:
      image-routine-updates: {applies-to: version-updates, patterns: ["*"], update-types: [minor, patch]}
      image-security-updates: {applies-to: security-updates, patterns: ["*"]}

  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly, day: monday, time: "09:20", timezone: America/Toronto}
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "*"
        update-types: [version-update:semver-minor, version-update:semver-patch]
    groups:
      action-routine-updates: {applies-to: version-updates, patterns: ["*"], update-types: [minor, patch]}
      action-security-updates: {applies-to: security-updates, patterns: ["*"]}
