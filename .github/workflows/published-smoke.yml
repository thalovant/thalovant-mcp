name: Published artifacts smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: Aligned npm, OCI, and MCP Registry version to verify
        required: true
        default: 0.1.5

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Install and verify the published npm stdio artifact
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p "$RUNNER_TEMP/thalovant-mcp-smoke"
          npm install --prefix "$RUNNER_TEMP/thalovant-mcp-smoke" "@thalovant/mcp-server@$PACKAGE_VERSION"
          node scripts/smoke-published.mjs stdio "$RUNNER_TEMP/thalovant-mcp-smoke/node_modules/.bin/thalovant-mcp"
      - name: Start the published OCI artifact
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          docker pull "ghcr.io/thalovant/thalovant-mcp:$PACKAGE_VERSION"
          docker run --rm -d --name thalovant-mcp-smoke -p 127.0.0.1:3000:3000 -e MCP_HTTP_AUTH_TOKEN=published-smoke-token -e MCP_HTTP_ALLOWED_HOSTS=127.0.0.1:3000,localhost:3000 "ghcr.io/thalovant/thalovant-mcp:$PACKAGE_VERSION"
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs thalovant-mcp-smoke
          exit 1
      - name: Verify the published OCI Streamable HTTP artifact
        run: node scripts/smoke-published.mjs http http://127.0.0.1:3000/mcp published-smoke-token
      - name: Verify aligned MCP Registry metadata
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          curl -fsSL "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.thalovant/thalovant-mcp" \
            | node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(0,"utf8")); const version=process.env.PACKAGE_VERSION; const entry=data.servers?.find(({server,_meta})=>server?.name==="io.github.thalovant/thalovant-mcp"&&server?.version===version&&_meta?.["io.modelcontextprotocol.registry/official"]?.isLatest===true); if(!entry) process.exit(1); const types=new Set(entry.server.packages?.map((item)=>item.registryType)); if(!types.has("npm")||!types.has("oci")) process.exit(1);'
      - if: always()
        run: docker rm -f thalovant-mcp-smoke >/dev/null 2>&1 || true
