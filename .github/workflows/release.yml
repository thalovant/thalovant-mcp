name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  MCP_PUBLISHER_VERSION: "1.8.0"
  MCP_PUBLISHER_LINUX_AMD64_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - id: package
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches the package version
        if: github.event_name == 'push'
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Build package artifact and CycloneDX SBOM
        id: artifacts
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          mkdir -p release-artifacts
          npm sbom --omit=dev --sbom-format cyclonedx > "release-artifacts/thalovant-mcp-$PACKAGE_VERSION.cdx.json"
          PACKAGE_FILE="$(npm pack --pack-destination release-artifacts --json | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const parsed = JSON.parse(input); const entry = Array.isArray(parsed) ? parsed[0] : Object.values(parsed)[0]; if (!entry?.filename) throw new Error("npm pack did not return a package filename"); console.log(entry.filename); });')"
          echo "tarball=$GITHUB_WORKSPACE/release-artifacts/$PACKAGE_FILE" >> "$GITHUB_OUTPUT"
          echo "sbom=$GITHUB_WORKSPACE/release-artifacts/thalovant-mcp-$PACKAGE_VERSION.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Attest package provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.artifacts.outputs.tarball }}

      - name: Attest package SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.artifacts.outputs.tarball }}
          sbom-path: ${{ steps.artifacts.outputs.sbom }}

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_TARBALL: ${{ steps.artifacts.outputs.tarball }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@thalovant/mcp-server@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "@thalovant/mcp-server@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            npm publish "$PACKAGE_TARBALL" --access public --provenance
          fi

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/thalovant/thalovant-mcp
          tags: |
            type=raw,value=${{ steps.package.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install and verify the published npm stdio artifact
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          for attempt in $(seq 1 12); do
            if npm view "@thalovant/mcp-server@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              break
            fi
            sleep 10
          done
          mkdir -p "$RUNNER_TEMP/thalovant-mcp-smoke"
          npm install --prefix "$RUNNER_TEMP/thalovant-mcp-smoke" "@thalovant/mcp-server@$PACKAGE_VERSION"
          node scripts/smoke-published.mjs stdio "$RUNNER_TEMP/thalovant-mcp-smoke/node_modules/.bin/thalovant-mcp"

      - name: Start and verify the published OCI Streamable HTTP artifact
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          docker pull "ghcr.io/thalovant/thalovant-mcp:$PACKAGE_VERSION"
          docker run --rm -d --name thalovant-mcp-smoke -p 127.0.0.1:3000:3000 -e MCP_HTTP_AUTH_TOKEN=published-smoke-token -e MCP_HTTP_ALLOWED_HOSTS=127.0.0.1:3000,localhost:3000 "ghcr.io/thalovant/thalovant-mcp:$PACKAGE_VERSION"
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null; then
              node scripts/smoke-published.mjs http http://127.0.0.1:3000/mcp published-smoke-token
              docker rm -f thalovant-mcp-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs thalovant-mcp-smoke
          docker rm -f thalovant-mcp-smoke
          exit 1

      - name: Install MCP publisher
        run: |
          archive="mcp-publisher_linux_amd64.tar.gz"
          curl --fail --location --retry 3 --output "$archive" "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/$archive"
          echo "${MCP_PUBLISHER_LINUX_AMD64_SHA256}  $archive" | sha256sum --check --strict
          tar xzf "$archive" mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          if curl -fsSL "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.thalovant/thalovant-mcp" \
            | node -e "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); const version = process.env.PACKAGE_VERSION; process.exit(data.servers?.some((entry) => entry.server?.name === 'io.github.thalovant/thalovant-mcp' && entry.server?.version === version) ? 0 : 1)"; then
            echo "io.github.thalovant/thalovant-mcp ${PACKAGE_VERSION} is already in the MCP Registry; skipping publish."
          else
            ./mcp-publisher publish
          fi
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}

      - name: Create GitHub release with package and SBOM
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          TARBALL: ${{ steps.artifacts.outputs.tarball }}
          SBOM: ${{ steps.artifacts.outputs.sbom }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            EXISTING_ASSETS="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
            for artifact in "$TARBALL" "$SBOM"; do
              name="$(basename "$artifact")"
              if grep -Fxq "$name" <<< "$EXISTING_ASSETS"; then
                echo "$name is already attached to $RELEASE_TAG; preserving the existing asset."
              else
                gh release upload "$RELEASE_TAG" "$artifact"
              fi
            done
          else
            gh release create "$RELEASE_TAG" "$TARBALL" "$SBOM" --verify-tag --title "$RELEASE_TAG" --notes "Release $RELEASE_TAG"
          fi
