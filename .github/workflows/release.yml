name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - id: package
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish npm package
        run: |
          version="${{ steps.package.outputs.version }}"
          if npm view "@thalovant/mcp-server@${version}" version >/dev/null 2>&1; then
            echo "@thalovant/mcp-server@${version} is already published; skipping npm publish."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/thalovant/thalovant-mcp
          tags: |
            type=raw,value=${{ steps.package.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install and verify the published npm stdio artifact
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          for attempt in $(seq 1 12); do
            if npm view "@thalovant/mcp-server@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              break
            fi
            sleep 10
          done
          mkdir -p "$RUNNER_TEMP/thalovant-mcp-smoke"
          npm install --prefix "$RUNNER_TEMP/thalovant-mcp-smoke" "@thalovant/mcp-server@$PACKAGE_VERSION"
          node scripts/smoke-published.mjs stdio "$RUNNER_TEMP/thalovant-mcp-smoke/node_modules/.bin/thalovant-mcp"

      - name: Start and verify the published OCI Streamable HTTP artifact
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          docker pull "ghcr.io/thalovant/thalovant-mcp:$PACKAGE_VERSION"
          docker run --rm -d --name thalovant-mcp-smoke -p 127.0.0.1:3000:3000 -e MCP_HTTP_AUTH_TOKEN=published-smoke-token -e MCP_HTTP_ALLOWED_HOSTS=127.0.0.1:3000,localhost:3000 "ghcr.io/thalovant/thalovant-mcp:$PACKAGE_VERSION"
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null; then
              node scripts/smoke-published.mjs http http://127.0.0.1:3000/mcp published-smoke-token
              docker rm -f thalovant-mcp-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs thalovant-mcp-smoke
          docker rm -f thalovant-mcp-smoke
          exit 1

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          if curl -fsSL "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.thalovant/thalovant-mcp" \
            | node -e "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); const version = process.env.PACKAGE_VERSION; process.exit(data.servers?.some((entry) => entry.server?.name === 'io.github.thalovant/thalovant-mcp' && entry.server?.version === version) ? 0 : 1)"; then
            echo "io.github.thalovant/thalovant-mcp ${PACKAGE_VERSION} is already in the MCP Registry; skipping publish."
          else
            ./mcp-publisher publish
          fi
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
