name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_docker:
        description: "Also publish the GHCR image"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - id: package
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish npm package
        run: |
          version="${{ steps.package.outputs.version }}"
          if npm view "@thalovant/mcp-server@${version}" version >/dev/null 2>&1; then
            echo "@thalovant/mcp-server@${version} is already published; skipping npm publish."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: docker/login-action@v4
        if: ${{ inputs.publish_docker == true }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        if: ${{ inputs.publish_docker == true }}
        id: meta
        with:
          images: ghcr.io/thalovant/thalovant-mcp
          tags: |
            type=raw,value=${{ steps.package.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        if: ${{ inputs.publish_docker == true }}
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          if curl -fsSL "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.thalovant/thalovant-mcp" \
            | node -e "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); const version = process.env.PACKAGE_VERSION; process.exit(data.servers?.some((entry) => entry.server?.name === 'io.github.thalovant/thalovant-mcp' && entry.server?.version === version) ? 0 : 1)"; then
            echo "io.github.thalovant/thalovant-mcp ${PACKAGE_VERSION} is already in the MCP Registry; skipping publish."
          else
            ./mcp-publisher publish
          fi
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
